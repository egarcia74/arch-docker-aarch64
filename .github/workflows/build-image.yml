name: build-image

on:
  schedule:
    - cron: "17 6 * * 1" # weekly Mon 06:17 UTC — refresh the rolling-release image
  push:
    branches: [main]
    paths: # only when something that affects the image changes
      - "docker/**"
      - "scripts/Build-ArchImage.ps1"
      - "scripts/_Common.ps1"
      - "config/container.psd1"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # keyless cosign image signing (OIDC)

env:
  IMAGE: ghcr.io/${{ github.repository }} # GHCR repo (owner/name); follows renames & forks

jobs:
  # Gate: the same lint + tests + markdown checks as the local pre-commit.
  quality:
    runs-on: ubuntu-latest # no Docker/arm needed — pure pwsh + node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: ./scripts/Invoke-Lint.ps1
      - name: Test (Pester)
        shell: pwsh
        run: ./scripts/Invoke-Tests.ps1 -CI
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/testresults.xml
          if-no-files-found: ignore
      - name: Markdown check (prettier + markdownlint)
        shell: pwsh
        run: ./scripts/Format-Markdown.ps1 -Check

  # Build natively on aarch64 (no QEMU) and publish to GHCR.
  build:
    needs: quality
    runs-on: ubuntu-24.04-arm # native arm64 hosted runner (free for public repos)
    steps:
      - uses: actions/checkout@v4
      - name: Build image via the project's own build script
        shell: pwsh
        run: ./scripts/Build-ArchImage.ps1 -StrictChecksum # checksum failure is fatal in CI
      - name: Resolve the local image tag from config (single source of truth)
        id: cfg
        shell: pwsh
        run: |
          . ./scripts/_Common.ps1
          "tag=$((Get-ArchConfig).ImageName)" >> $env:GITHUB_OUTPUT
      - name: Scan image for vulnerabilities (Trivy, fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.cfg.outputs.tag }} # the locally built image
          format: table
          output: trivy.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true # only surface CVEs that actually have a fix available
          exit-code: "0" # informational: surfaced in the run summary, doesn't block the build
      - name: Publish Trivy findings to the run summary
        if: always()
        run: |
          {
            echo '### Trivy — fixable HIGH/CRITICAL CVEs'
            echo '```'
            cat trivy.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag & push (latest + dated + commit SHA)
        env:
          LOCAL: ${{ steps.cfg.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT="${SHA:0:7}"
          for tag in latest "$DATE" "sha-$SHORT"; do
            docker tag "$LOCAL" "$IMAGE:$tag"
            docker push "$IMAGE:$tag"
          done
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign the published image by digest (keyless)
        run: |
          # Sign the immutable digest: all of latest/date/sha- tags point to it, so one
          # signature covers them all (smoke verifies via the sha- tag, which resolves to it).
          DIGEST=$(docker inspect --format '{{ index .RepoDigests 0 }}' "$IMAGE:latest")
          echo "signing $DIGEST"
          cosign sign --yes "$DIGEST"

  # Pull the just-published image and assert core invariants — catches regressions that
  # lint and Pester cannot (the actual built image, on a native arm64 runner).
  smoke:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify the image signature (keyless, from this repo's CI)
        env:
          SHA: ${{ github.sha }}
        run: |
          cosign verify "$IMAGE:sha-${SHA:0:7}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com >/dev/null
          echo "signature verified"
      - name: Smoke test the published image
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="sha-${SHA:0:7}" # test the exact image this commit produced, not :latest
          docker run --rm --user dev --entrypoint bash "$IMAGE:$TAG" -lc '
            set -e
            [ "$(uname -m)" = aarch64 ]
            id dev >/dev/null
            sudo -n true
            # representative binaries from config Packages (base-devel -> gcc/make, openssh -> sshd)
            for c in git vim sudo which gcc make sshd; do command -v "$c" >/dev/null; done
            sudo ssh-keygen -A >/dev/null
            test -f /etc/ssh/ssh_host_ed25519_key
            test -x /usr/local/bin/entrypoint.sh
            echo "smoke OK: arch=$(uname -m), dev+sudo, packages, ssh host keys, entrypoint"
          '
